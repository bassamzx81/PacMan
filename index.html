<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Pac-Man</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: #000; overflow: hidden; overscroll-behavior: none; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5vh;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent; touch-action: none;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  canvas { height: min(96vh, calc(96vw * 544 / 448)); image-rendering: auto; touch-action: none; }

  /* collapsible speed sliders, fixed on the left edge */
  #speedControls {
    position: fixed; left: 12px; top: 50%; transform: translateY(-50%); z-index: 10;
    display: flex; flex-direction: column; gap: 14px;
    background: rgba(20, 20, 45, 0.7); padding: 10px; border-radius: 10px;
    color: #fff; font: 10px "Courier New", monospace; letter-spacing: 0.5px;
  }
  #speedToggle {
    display: flex; align-items: center; gap: 6px; width: 100%;
    background: none; border: none; cursor: pointer; padding: 0;
    color: #fff; font: bold 10px "Courier New", monospace; letter-spacing: 1px;
  }
  #speedToggleIcon { color: #ff5ebc; transition: transform 0.15s; }
  #speedControls:not(.collapsed) #speedToggleIcon { transform: rotate(90deg); }
  #speedBody { display: flex; flex-direction: column; gap: 18px; }
  #speedControls.collapsed #speedBody { display: none; }
  #speedControls label { display: flex; flex-direction: column; gap: 8px; }
  #speedControls span { color: #ffeb3b; font-weight: bold; }
  #speedControls input[type=range] { width: 110px; accent-color: #ff5ebc; cursor: pointer; }

  /* on-screen controls — only shown on touch devices (body.touch) */
  #controls { display: none; }
  body.touch { justify-content: space-between; }
  body.touch canvas { height: min(58vh, calc(96vw * 544 / 448)); }
  body.touch #controls {
    display: flex; align-items: center; justify-content: center; gap: 7vw;
    width: 100%; padding-bottom: 1vh;
  }
  #dpad {
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    width: min(50vw, 220px); aspect-ratio: 1; gap: 5px;
  }
  #dpad button, #sidebtns button {
    border: none; color: #000; font-family: "Courier New", monospace; font-weight: bold;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  #dpad button {
    background: rgba(255, 221, 0, 0.85); border-radius: 14px; font-size: clamp(18px, 6vw, 32px);
  }
  #dpad button:active, #sidebtns button:active { background: #fff; }
  #dpad .up { grid-area: 1 / 2; } #dpad .left { grid-area: 2 / 1; }
  #dpad .right { grid-area: 2 / 3; } #dpad .down { grid-area: 3 / 2; }
  #sidebtns { display: flex; flex-direction: column; gap: 2.5vh; }
  #sidebtns button {
    width: clamp(48px, 14vw, 64px); height: clamp(48px, 14vw, 64px); border-radius: 50%;
    background: rgba(255, 255, 255, 0.18); color: #fff; font-size: clamp(16px, 5vw, 24px);
  }
</style>
</head>
<body>
<div id="speedControls" class="collapsed">
  <button id="speedToggle" aria-expanded="false" aria-controls="speedBody">
    <span id="speedToggleIcon">&#9654;</span> SPEED
  </button>
  <div id="speedBody">
    <label>PAC-MAN SPEED <span id="pacVal">2</span>
      <input type="range" id="pacSlider" min="1" max="6" step="1" value="2">
    </label>
    <label>GHOST SPEED <span id="ghostVal">1.00</span>
      <input type="range" id="ghostSlider" min="0.2" max="1.5" step="0.05" value="1">
    </label>
    <label>GHOSTS <span id="countVal">1</span>
      <input type="range" id="countSlider" min="1" max="4" step="1" value="1">
    </label>
  </div>
</div>
<canvas id="game" width="448" height="544"></canvas>
<div id="controls" aria-hidden="true">
  <div id="dpad">
    <button class="up" data-dir="0" aria-label="Up">&#9650;</button>
    <button class="left" data-dir="1" aria-label="Left">&#9664;</button>
    <button class="right" data-dir="3" aria-label="Right">&#9654;</button>
    <button class="down" data-dir="2" aria-label="Down">&#9660;</button>
  </div>
  <div id="sidebtns">
    <button id="pauseBtn" aria-label="Pause">&#10073;&#10073;</button>
    <button id="muteBtn" aria-label="Mute">&#9834;</button>
  </div>
</div>
<script>
'use strict';

const TILE = 16, COLS = 28, ROWS = 31, HUD = 24;
const W = COLS * TILE, H = ROWS * TILE;

// 28x31 maze. # wall, . dot, o power pellet, - ghost house door, space empty
const RAW = [
  "############################",
  "#............##............#",
  "#.####.#####.##.#####.####.#",
  "#o####.#####.##.#####.####o#",
  "#.####.#####.##.#####.####.#",
  "#..........................#",
  "#.####.##.########.##.####.#",
  "#.####.##.########.##.####.#",
  "#......##....##....##......#",
  "######.##### ## #####.######",
  "     #.##### ## #####.#     ",
  "     #.##          ##.#     ",
  "     #.## ###--### ##.#     ",
  "######.## #      # ##.######",
  "      .   #      #   .      ",
  "######.## #      # ##.######",
  "     #.## ######## ##.#     ",
  "     #.##          ##.#     ",
  "     #.## ######## ##.#     ",
  "######.## ######## ##.######",
  "#............##............#",
  "#.####.#####.##.#####.####.#",
  "#.####.#####.##.#####.####.#",
  "#o..##.......  .......##..o#",
  "###.##.##.########.##.##.###",
  "###.##.##.########.##.##.###",
  "#......##....##....##......#",
  "#.##########.##.##########.#",
  "#.##########.##.##########.#",
  "#..........................#",
  "############################",
];

const EMPTY = 0, WALL = 1, DOT = 2, PELLET = 3, DOOR = 4;
const DIRS = [{x:0,y:-1},{x:-1,y:0},{x:0,y:1},{x:1,y:0}]; // up, left, down, right
const OPP = [2, 3, 0, 1];
const EXIT = {c:13, r:11};  // tile just above the ghost house door
const HOME = {c:13, r:14};  // tile inside the ghost house

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Supersample: render at SSx the logical resolution so circular outlines and the
// photo faces scale smoothly instead of pixelating. The maze stays crisp because
// it's prebaked at the same resolution. CSS still displays at the logical size.
const SS = 3;
const CANVAS_W = W, CANVAS_H = HUD * 2 + H;
canvas.width = CANVAS_W * SS;
canvas.height = CANVAS_H * SS;

let grid, dotsLeft;
let score = 0, high = 0, lives = 3, level = 1;
let state = 'ready', stateTimer = 0, frame = 0;
let frightTimer = 0, ghostChain = 0, freezeTimer = 0;
let paused = false, extraAwarded = false;
let modeIdx = 0, modeTimer = 0;
let popups = [];

const PHASES = [[7,'scatter'],[20,'chase'],[7,'scatter'],[20,'chase'],
                [5,'scatter'],[20,'chase'],[5,'scatter'],[1e9,'chase']];

try { high = +(localStorage.getItem('pacman.high') || 0); } catch (e) {}

const pac = {x:0, y:0, dir:DIRS[1], nextDir:null, moving:true, anim:0};

const GHOST_DEFS = [
  {name:'blinky', color:'#ff5ebc', c:13, r:11, scatter:{c:25, r:0},  release:0},
  {name:'pinky',  color:'#ffb8ff', c:13, r:14, scatter:{c:2,  r:0},  release:2},
  {name:'inky',   color:'#00ffff', c:11, r:14, scatter:{c:27, r:30}, release:5},
  {name:'clyde',  color:'#ffb852', c:16, r:14, scatter:{c:0,  r:30}, release:8},
];
let ghosts = [];
let GHOST_COUNT = 1;     // how many of the four ghosts to spawn (1-4); live-tunable via slider
let GHOST_SPEED = 1; // ghost speed relative to Pac-Man's base (lower = easier); live-tunable via slider
let PAC_STEP = 2;    // Pac-Man pixels per frame (higher = faster); live-tunable via slider

// bonus fruit — appears after eating set numbers of dots, worth points by level
let totalDots = 0, fruitsSpawned = 0;
let fruit = {active: false, timer: 0, type: 'cherry', points: 100};
const FRUIT_POS = {x: 14 * TILE, y: 23 * TILE + 8}; // Pac-Man's home corridor (reachable)
const FRUIT_TRIGGERS = [70, 170];                   // dots eaten before each appearance
const FRUIT_TIME = 9.5 * 60;                         // ~9.5s on screen
const FRUITS = [
  {type: 'cherry',     points: 100},
  {type: 'strawberry', points: 300},
  {type: 'orange',     points: 500},
  {type: 'apple',      points: 700},
  {type: 'melon',      points: 1000},
];
const fruitForLevel = lv => FRUITS[Math.min(lv - 1, FRUITS.length - 1)];

function buildGrid() {
  dotsLeft = 0;
  grid = RAW.map(row => [...row].map(ch => {
    if (ch === '#') return WALL;
    if (ch === '.') { dotsLeft++; return DOT; }
    if (ch === 'o') { dotsLeft++; return PELLET; }
    if (ch === '-') return DOOR;
    return EMPTY;
  }));
  totalDots = dotsLeft;
  fruitsSpawned = 0;
}

function tileAt(c, r) {
  if (r < 0 || r >= ROWS) return WALL;
  return grid[r][((c % COLS) + COLS) % COLS];
}
function walkable(c, r, door) {
  const t = tileAt(c, r);
  return t !== WALL && (t !== DOOR || door);
}
function atCenter(e) { return (e.x - 8) % TILE === 0 && (e.y - 8) % TILE === 0; }
function wrapX(e) { if (e.x < 0) e.x += W; else if (e.x >= W) e.x -= W; }
function revDir(d) { return DIRS[OPP[DIRS.indexOf(d)]]; }
function currentMode() { return PHASES[modeIdx][1]; }

// BFS over the tile grid. Returns the first-step direction toward the target
// tile; if the target is unreachable, heads for the closest reachable tile.
function bfsDir(e, tc, tr, allowDoor, allowReverse) {
  const sc = Math.floor(e.x / TILE), sr = Math.floor(e.y / TILE);
  for (let pass = 0; pass < 2; pass++) {
    const rev = allowReverse || pass === 1;
    const dist = new Int32Array(COLS * ROWS).fill(-1);
    const first = new Int8Array(COLS * ROWS).fill(-1);
    const q = [];
    for (let i = 0; i < 4; i++) {
      const d = DIRS[i];
      if (!rev && d.x === -e.dir.x && d.y === -e.dir.y) continue;
      const nc = ((sc + d.x) % COLS + COLS) % COLS, nr = sr + d.y;
      if (nr < 0 || nr >= ROWS || !walkable(nc, nr, allowDoor)) continue;
      const id = nr * COLS + nc;
      if (dist[id] >= 0) continue;
      dist[id] = 1; first[id] = i; q.push(id);
    }
    for (let h = 0; h < q.length; h++) {
      const id = q[h], r = (id / COLS) | 0, c = id % COLS;
      for (let i = 0; i < 4; i++) {
        const d = DIRS[i];
        const nc = ((c + d.x) % COLS + COLS) % COLS, nr = r + d.y;
        if (nr < 0 || nr >= ROWS || !walkable(nc, nr, allowDoor)) continue;
        const nid = nr * COLS + nc;
        if (dist[nid] >= 0) continue;
        dist[nid] = dist[id] + 1; first[nid] = first[id]; q.push(nid);
      }
    }
    let best = -1, bestScore = Infinity;
    for (let id = 0; id < dist.length; id++) {
      if (dist[id] < 0) continue;
      const r = (id / COLS) | 0, c = id % COLS;
      let dx = Math.abs(c - tc); dx = Math.min(dx, COLS - dx);
      const dy = r - tr;
      const s = (dx * dx + dy * dy) * 10000 + dist[id];
      if (s < bestScore) { bestScore = s; best = id; }
    }
    if (best >= 0) return DIRS[first[best]];
  }
  return e.dir;
}

function spawnGhosts() {
  ghosts = GHOST_DEFS.slice(0, GHOST_COUNT).map((d, i) => ({
    name: d.name, color: d.color, scatter: d.scatter,
    x: d.c * TILE + 8, y: d.r * TILE + 8, homeY: d.r * TILE + 8,
    dir: i === 0 ? DIRS[1] : DIRS[0],
    state: i === 0 ? 'normal' : 'house',
    releaseTimer: d.release * 60, bounceDir: 1, frightened: false,
    phase: i, // offsets each ghost's eye-animation so they're not all in sync
  }));
}

function resetActors() {
  pac.x = 14 * TILE; pac.y = 23 * TILE + 8;
  pac.dir = DIRS[1]; pac.nextDir = null; pac.moving = true; pac.anim = 0;
  spawnGhosts();
  frightTimer = 0; ghostChain = 0; freezeTimer = 0;
  modeIdx = 0; modeTimer = PHASES[0][0] * 60;
  fruit.active = false;
}

function newGame() {
  score = 0; lives = 3; level = 1; extraAwarded = false; popups = [];
  buildGrid(); resetActors();
  state = 'ready'; stateTimer = 120;
}

function saveHigh() {
  try { localStorage.setItem('pacman.high', high); } catch (e) {}
}

function addScore(n) {
  score += n;
  if (score > high) high = score;
  if (!extraAwarded && score >= 10000) {
    extraAwarded = true; lives++;
    popups.push({x: pac.x, y: pac.y - 12, text: '1UP', ttl: 90});
    extraLifeSound();
  }
}

function frighten() {
  frightTimer = Math.max(10 - (level - 1), 4) * 60;
  ghostChain = 0;
  for (const g of ghosts) if (g.state === 'normal') {
    g.frightened = true;
    g.dir = revDir(g.dir);
  }
}

function chaseTarget(g) {
  const pc = Math.floor(pac.x / TILE), pr = Math.floor(pac.y / TILE);
  if (g.name === 'blinky') return {c: pc, r: pr};
  if (g.name === 'pinky') return {c: pc + pac.dir.x * 4, r: pr + pac.dir.y * 4};
  if (g.name === 'inky') {
    const b = ghosts[0];
    const bc = Math.floor(b.x / TILE), br = Math.floor(b.y / TILE);
    const ac = pc + pac.dir.x * 2, ar = pr + pac.dir.y * 2;
    return {c: ac * 2 - bc, r: ar * 2 - br};
  }
  // clyde: chase when far, retreat to corner when within 8 tiles
  const gc = Math.floor(g.x / TILE), gr = Math.floor(g.y / TILE);
  const d2 = (gc - pc) ** 2 + (gr - pr) ** 2;
  return d2 > 64 ? {c: pc, r: pr} : g.scatter;
}

function randomDir(g, c, r) {
  const opts = [];
  for (const d of DIRS) {
    if (d.x === -g.dir.x && d.y === -g.dir.y) continue;
    if (walkable(c + d.x, r + d.y, false)) opts.push(d);
  }
  if (!opts.length) return revDir(g.dir);
  return opts[(Math.random() * opts.length) | 0];
}

// returned as a multiple of PAC_STEP so ghosts keep pace with Pac-Man's speed;
// updateGhost scales this by GHOST_SPEED for the final difficulty ratio
function ghostSpeed(g) {
  if (g.state === 'eaten') return PAC_STEP * 2;     // eyes race home
  if (g.state === 'leaving') return PAC_STEP * 0.5;
  if (g.frightened) return PAC_STEP * 0.5;
  const c = Math.floor(g.x / TILE), r = Math.floor(g.y / TILE);
  if (r === 14 && (c < 6 || c > 21)) return PAC_STEP * 0.5; // tunnel slowdown
  return PAC_STEP;
}

function updateGhost(g) {
  if (g.state === 'house') {
    g.releaseTimer--;
    g.y += g.bounceDir * 0.5;
    if (g.y <= g.homeY - 3) g.bounceDir = 1;
    else if (g.y >= g.homeY + 3) g.bounceDir = -1;
    if (g.releaseTimer <= 0) { g.y = g.homeY; g.state = 'leaving'; }
    return;
  }
  // fractional accumulator keeps the ghost a touch slower than Pac-Man while
  // still only ever moving whole pixels (so tile-center alignment holds)
  g.moveAcc = (g.moveAcc || 0) + ghostSpeed(g) * GHOST_SPEED;
  const sp = Math.floor(g.moveAcc);
  g.moveAcc -= sp;
  for (let i = 0; i < sp; i++) {
    if (atCenter(g)) {
      const c = Math.floor(g.x / TILE), r = Math.floor(g.y / TILE);
      if (g.state === 'leaving') {
        if (c === EXIT.c && r === EXIT.r) { g.state = 'normal'; g.dir = DIRS[1]; }
        else g.dir = bfsDir(g, EXIT.c, EXIT.r, true, true);
      } else if (g.state === 'eaten') {
        if (c === HOME.c && r === HOME.r) g.state = 'leaving';
        else g.dir = bfsDir(g, HOME.c, HOME.r, true, true);
      }
      if (g.state === 'normal') {
        if (g.frightened) g.dir = randomDir(g, c, r);
        else {
          const t = currentMode() === 'scatter' ? g.scatter : chaseTarget(g);
          g.dir = bfsDir(g, t.c, t.r, false, false);
        }
      }
    }
    g.x += g.dir.x; g.y += g.dir.y;
    wrapX(g);
  }
}

function eatAt(c, r) {
  const t = grid[r][c];
  if (t === DOT) { grid[r][c] = EMPTY; dotsLeft--; addScore(10); wakaSound(); }
  else if (t === PELLET) { grid[r][c] = EMPTY; dotsLeft--; addScore(50); wakaSound(); frighten(); }
  if (dotsLeft === 0) { state = 'cleared'; stateTimer = 150; saveHigh(); }
}

function updateFruit() {
  // appear once each trigger count of dots has been eaten this level
  if (fruitsSpawned < FRUIT_TRIGGERS.length &&
      (totalDots - dotsLeft) >= FRUIT_TRIGGERS[fruitsSpawned]) {
    const f = fruitForLevel(level);
    fruit = {active: true, timer: FRUIT_TIME, type: f.type, points: f.points};
    fruitsSpawned++;
  }
  if (!fruit.active) return;
  if (--fruit.timer <= 0) { fruit.active = false; return; }
  if (Math.abs(pac.x - FRUIT_POS.x) < 10 && Math.abs(pac.y - FRUIT_POS.y) < 10) {
    addScore(fruit.points);
    popups.push({x: FRUIT_POS.x, y: FRUIT_POS.y - 6, text: String(fruit.points),
                 ttl: 100, color: '255,220,90'});
    fruit.active = false;
    fruitSound();
  }
}

function updatePac() {
  pac.anim++;
  if (pac.nextDir && pac.nextDir.x === -pac.dir.x && pac.nextDir.y === -pac.dir.y) {
    pac.dir = pac.nextDir; pac.nextDir = null; pac.moving = true;
  }
  for (let i = 0; i < PAC_STEP; i++) {
    if (atCenter(pac)) {
      const c = Math.floor(pac.x / TILE), r = Math.floor(pac.y / TILE);
      eatAt(c, r);
      if (state !== 'playing') return;
      if (pac.nextDir && walkable(c + pac.nextDir.x, r + pac.nextDir.y, false)) {
        pac.dir = pac.nextDir; pac.nextDir = null;
      }
      pac.moving = walkable(c + pac.dir.x, r + pac.dir.y, false);
    }
    if (!pac.moving) break;
    pac.x += pac.dir.x; pac.y += pac.dir.y;
    wrapX(pac);
  }
}

function checkCollisions() {
  for (const g of ghosts) {
    if (g.state !== 'normal') continue;
    if (Math.abs(g.x - pac.x) < 10 && Math.abs(g.y - pac.y) < 10) {
      if (g.frightened) {
        ghostChain++;
        const pts = 100 * (2 ** ghostChain); // 200, 400, 800, 1600
        addScore(pts);
        popups.push({x: g.x, y: g.y, text: String(pts), ttl: 70});
        g.state = 'eaten'; g.frightened = false;
        freezeTimer = 20;
        eatGhostSound();
      } else {
        state = 'dying'; stateTimer = 120; saveHigh();
        deathSound();
        return;
      }
    }
  }
}

function update() {
  frame++;
  for (const p of popups) p.ttl--;
  popups = popups.filter(p => p.ttl > 0);

  if (state === 'ready') {
    if (--stateTimer <= 0) state = 'playing';
  } else if (state === 'playing') {
    if (freezeTimer > 0) { freezeTimer--; return; }
    updatePac();
    if (state !== 'playing') return;
    updateFruit();
    for (const g of ghosts) updateGhost(g);
    checkCollisions();
    if (state !== 'playing') return;
    if (frightTimer > 0) {
      if (--frightTimer === 0) {
        for (const g of ghosts) g.frightened = false;
        ghostChain = 0;
      }
    } else {
      if (--modeTimer <= 0 && modeIdx < PHASES.length - 1) {
        modeIdx++;
        modeTimer = PHASES[modeIdx][0] * 60;
        for (const g of ghosts)
          if (g.state === 'normal' && !g.frightened) g.dir = revDir(g.dir);
      }
    }
  } else if (state === 'dying') {
    if (--stateTimer <= 0) {
      lives--;
      if (lives <= 0) state = 'gameover';
      else { resetActors(); state = 'ready'; stateTimer = 120; }
    }
  } else if (state === 'cleared') {
    if (--stateTimer <= 0) {
      level++;
      buildGrid(); resetActors();
      state = 'ready'; stateTimer = 120;
    }
  }
}

// ---------- rendering ----------

function renderMaze(color) {
  const cv = document.createElement('canvas');
  cv.width = W * SS; cv.height = H * SS;
  const m = cv.getContext('2d');
  m.scale(SS, SS);
  m.fillStyle = color;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (grid[r][c] !== WALL) continue;
    const x = c * TILE, y = r * TILE;
    if (m.roundRect) {
      m.beginPath(); m.roundRect(x + 4, y + 4, 8, 8, 4); m.fill();
    } else m.fillRect(x + 4, y + 4, 8, 8);
    if (tileAt(c + 1, r) === WALL) m.fillRect(x + 8, y + 4, 16, 8);
    if (tileAt(c, r + 1) === WALL) m.fillRect(x + 4, y + 8, 8, 16);
  }
  return cv;
}

// brighten the photos so they stay readable at sprite size on the black maze
function loadFace(b64, filter) {
  const face = {sprite: null};
  if (!b64) return face;
  const img = new Image();
  img.onload = () => {
    const cv = document.createElement('canvas');
    cv.width = img.width; cv.height = img.height;
    const fc = cv.getContext('2d');
    fc.filter = filter || 'brightness(1.45) saturate(1.35) contrast(1.08)';
    fc.drawImage(img, 0, 0);
    face.sprite = cv;
  };
  img.src = 'data:image/png;base64,' + b64;
  return face;
}
// Pac-Man uses two photos (mouth closed / open) that alternate with the chomp;
// these are already well-lit, so only a gentle lift keeps them crisp and clear
const PAC_FILTER = 'brightness(1.08) saturate(1.12) contrast(1.05)';
const pacFrames = [loadFace(FACE1_B64, PAC_FILTER), loadFace(FACE2_B64, PAC_FILTER)];
// ghosts cycle three photos (forward / looking left / looking right) so their
// eyes dart around; ping-pong sequence keeps it lively, gentle filter for clarity
const GHOST_FILTER = 'brightness(1.12) saturate(1.15) contrast(1.05)';
const ghostFrames = [
  loadFace(GHOST1_B64, GHOST_FILTER),
  loadFace(GHOST2_B64, GHOST_FILTER),
  loadFace(GHOST3_B64, GHOST_FILTER),
];
// shocked face shown while frightened (Pac-Man can eat the ghost)
const ghostScared = loadFace(SCARED_B64, GHOST_FILTER);
const GHOST_SEQ = [0, 1, 0, 2]; // forward, left, forward, right
const ghostSprite = phase =>
  ghostFrames[GHOST_SEQ[((frame >> 4) + phase) % GHOST_SEQ.length]].sprite;
const PAC_R = 12;         // drawn radius; collision logic is unaffected
const GHOST_SCALE = 1.6;  // drawn scale of the 14px ghost body
const GHOST_FACE_SIZE = 12;    // face drawn smaller than the body so the mouth shows
const GHOST_FACE_TOP = -8.5;   // normal face top relative to ghost center (sits in the dome)
const GHOST_SCARED_TOP = -10;  // scared photo sits higher (its open mouth is lower in frame)

function drawPacArc(x, y, ang, open, r) {
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.arc(x, y, r, ang + open, ang - open);
  ctx.closePath();
  // show the open-mouth photo when the wedge is open, closed-mouth when shut
  const fr = (open > 0.6 && pacFrames[1].sprite) ? pacFrames[1] : pacFrames[0];
  if (fr.sprite) {
    ctx.save();
    ctx.clip();
    ctx.drawImage(fr.sprite, x - r, y - r, r * 2, r * 2);
    ctx.restore();
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  } else {
    ctx.fillStyle = '#ffff00';
    ctx.fill();
  }
}

// vector bonus fruits, drawn centered at (x, y), roughly 14px tall
function drawFruit(type, x, y) {
  ctx.save();
  ctx.translate(x, y);
  if (type === 'cherry') {
    ctx.strokeStyle = '#3da13d'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-3, 4); ctx.quadraticCurveTo(4, -4, 2, -6);
    ctx.moveTo(3, 4);  ctx.quadraticCurveTo(5, -3, 2, -6);
    ctx.stroke();
    ctx.fillStyle = '#3da13d';
    ctx.beginPath(); ctx.moveTo(2, -6); ctx.lineTo(6, -7); ctx.lineTo(3, -4); ctx.fill();
    ctx.fillStyle = '#e21b1b';
    ctx.beginPath(); ctx.arc(-3, 5, 3, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(3, 5, 3, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(-4, 4, 1, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(2, 4, 1, 0, 7); ctx.fill();
  } else if (type === 'strawberry') {
    ctx.fillStyle = '#e21b1b';
    ctx.beginPath();
    ctx.moveTo(0, 7);
    ctx.quadraticCurveTo(-7, 2, -5, -3);
    ctx.quadraticCurveTo(0, -6, 5, -3);
    ctx.quadraticCurveTo(7, 2, 0, 7);
    ctx.fill();
    ctx.fillStyle = '#3da13d';
    ctx.beginPath();
    ctx.moveTo(-5, -3); ctx.lineTo(0, -7); ctx.lineTo(5, -3);
    ctx.quadraticCurveTo(0, -4, -5, -3); ctx.fill();
    ctx.fillStyle = '#ffe28a';
    for (const [sx, sy] of [[-2, 0], [2, 0], [0, 3], [-3, 3], [3, 3], [0, -1]]) {
      ctx.beginPath(); ctx.arc(sx, sy, 0.8, 0, 7); ctx.fill();
    }
  } else if (type === 'orange' || type === 'apple') {
    ctx.fillStyle = type === 'orange' ? '#ff9d2e' : '#e21b1b';
    ctx.beginPath(); ctx.arc(0, 1, 6, 0, 7); ctx.fill();
    ctx.strokeStyle = '#6b3f1d'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, -8); ctx.stroke();
    ctx.fillStyle = '#3da13d';
    ctx.beginPath(); ctx.ellipse(3, -7, 3, 1.6, 0.6, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(-2, -1, 1.5, 0, 7); ctx.fill();
  } else if (type === 'melon') {
    ctx.fillStyle = '#37c24a';
    ctx.beginPath(); ctx.arc(0, 0, 6.5, 0, 7); ctx.fill();
    ctx.strokeStyle = '#1f7a2e'; ctx.lineWidth = 0.8;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath(); ctx.moveTo(i * 2.5, -6);
      ctx.quadraticCurveTo(i * 3.2, 0, i * 2.5, 6); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(-2, -2, 1.5, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function ghostBodyPath(x, y) {
  ctx.beginPath();
  ctx.arc(x, y - 1, 7, Math.PI, 0);
  ctx.lineTo(x + 7, y + 6);
  ctx.lineTo(x + 4.66, y + 3.5);
  ctx.lineTo(x + 2.33, y + 6);
  ctx.lineTo(x, y + 3.5);
  ctx.lineTo(x - 2.33, y + 6);
  ctx.lineTo(x - 4.66, y + 3.5);
  ctx.lineTo(x - 7, y + 6);
  ctx.closePath();
}

function drawGhost(g) {
  ctx.save();
  ctx.translate(g.x, g.y);
  ctx.scale(GHOST_SCALE, GHOST_SCALE);
  const x = 0, y = 0;
  // normal: cycling face + colored outline; frightened: the scared photo with a
  // blue (white-flashing) outline so it still reads as edible; eaten: just eyes
  const scared = g.frightened && g.state !== 'eaten';
  const blueFlash = (frightTimer < 120 && (frame >> 3) & 1) ? '#f5f5f5' : '#2121de';
  const sprite = scared ? ghostScared.sprite : ghostSprite(g.phase || 0);
  const useFace = sprite && g.state !== 'eaten';
  if (g.state !== 'eaten') {
    ghostBodyPath(x, y);
    if (useFace) {
      // colored body behind a smaller face portrait so the mouth stays visible
      ctx.fillStyle = scared ? blueFlash : g.color;
      ctx.fill();
      ctx.save();
      ctx.clip();
      const S = GHOST_FACE_SIZE;
      const top = scared ? GHOST_SCARED_TOP : GHOST_FACE_TOP;
      ctx.drawImage(sprite, x - S / 2, y + top, S, S);
      ctx.restore();
      ctx.strokeStyle = scared ? blueFlash : g.color;
      ctx.lineWidth = scared ? 1 : 0.75; // rendered inside the GHOST_SCALE transform
      ctx.stroke();
    } else {
      ctx.fillStyle = scared ? blueFlash : g.color;
      ctx.fill();
    }
  }
  if (useFace) { ctx.restore(); return; }
  if (g.frightened && g.state !== 'eaten') {
    ctx.fillStyle = '#ffb8ae';
    ctx.fillRect(x - 4, y - 4, 2, 2);
    ctx.fillRect(x + 2, y - 4, 2, 2);
    ctx.strokeStyle = '#ffb8ae';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i <= 6; i++) {
      const zx = x - 5 + i * (10 / 6), zy = i % 2 === 0 ? y + 3 : y + 1;
      i === 0 ? ctx.moveTo(zx, zy) : ctx.lineTo(zx, zy);
    }
    ctx.stroke();
  } else {
    for (const s of [-1, 1]) {
      const ex = x + s * 2.8, ey = y - 2;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(ex, ey, 2.2, 2.7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2121de';
      ctx.beginPath();
      ctx.arc(ex + g.dir.x * 1.4, ey + g.dir.y * 1.4, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

const mouthOpen = () =>
  pac.moving ? (0.05 + 0.25 * Math.abs(Math.sin(pac.anim * 0.2))) * Math.PI
             : 0.25 * Math.PI;

function draw() {
  ctx.setTransform(SS, 0, 0, SS, 0, 0); // draw in logical units, supersampled
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.save();
  ctx.translate(0, HUD);

  const flash = state === 'cleared' && ((stateTimer >> 3) & 1) === 0;
  ctx.drawImage(flash ? mazeWhite : mazeBlue, 0, 0, W, H);
  ctx.fillStyle = '#ffb8de';
  ctx.fillRect(13 * TILE, 12 * TILE + 6, TILE * 2, 4);

  ctx.fillStyle = '#ffff00';
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = grid[r][c];
    if (t === DOT) {
      ctx.beginPath();
      ctx.arc(c * TILE + 8, r * TILE + 8, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    else if (t === PELLET && ((frame >> 4) & 1) === 0) {
      ctx.beginPath();
      ctx.arc(c * TILE + 8, r * TILE + 8, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffff00';
    }
  }

  if (fruit.active && (fruit.timer > 90 || ((frame >> 3) & 1) === 0))
    drawFruit(fruit.type, FRUIT_POS.x, FRUIT_POS.y);

  if (state === 'ready' || state === 'playing') {
    for (const g of ghosts) drawGhost(g);
    drawPacArc(pac.x, pac.y, Math.atan2(pac.dir.y, pac.dir.x), mouthOpen(), PAC_R);
  } else if (state === 'dying') {
    const p = 1 - stateTimer / 120;
    drawPacArc(pac.x, pac.y, -Math.PI / 2, Math.min(1, p * 1.2) * Math.PI, PAC_R);
  }

  ctx.font = 'bold 10px "Courier New", monospace';
  ctx.textAlign = 'center';
  for (const p of popups) {
    ctx.fillStyle = `rgba(${p.color || '0,255,255'},${Math.min(1, p.ttl / 30)})`;
    ctx.fillText(p.text, p.x, p.y);
  }

  ctx.font = 'bold 15px "Courier New", monospace';
  if (state === 'ready') {
    ctx.fillStyle = '#ffff00';
    ctx.fillText('READY!', 224, 17 * TILE + 13);
  } else if (state === 'gameover') {
    ctx.fillStyle = '#ff3333';
    ctx.fillText('GAME OVER', 224, 17 * TILE + 13);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px "Courier New", monospace';
    ctx.fillText(isTouch ? 'TAP TO RESTART' : 'PRESS ENTER TO RESTART', 224, 17 * TILE + 33);
  }
  if (paused) {
    ctx.fillStyle = '#fff';
    ctx.fillText('PAUSED', 224, 17 * TILE + 13);
  }
  ctx.restore();

  // HUD
  ctx.font = 'bold 13px "Courier New", monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, 8, 17);
  ctx.textAlign = 'right';
  ctx.fillText('HIGH ' + high, 440, 17);
  ctx.fillText('LEVEL ' + level, 440, HUD + H + 16);
  for (let i = 0; i < lives; i++)
    drawPacArc(16 + i * 18, HUD + H + 12, Math.PI, 0.25 * Math.PI, 7);
  drawFruit(fruitForLevel(level).type, 16 + lives * 18 + 4, HUD + H + 11);
  ctx.fillStyle = '#888';
  ctx.font = '9px "Courier New", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(isTouch ? 'SWIPE OR USE THE D-PAD' : 'ARROWS: MOVE · P: PAUSE · M: MUTE', 224, HUD + H + 16);
}

// ---------- sound ----------
// Web Audio approximations of the arcade effects, synthesized from scratch.

const AUDIO = {ctx: null, master: null, bg: null, bgType: null, muted: false, wakaHigh: false};

function audioInit() {
  if (AUDIO.ctx) return false;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return false;
  AUDIO.ctx = new AC();
  AUDIO.master = AUDIO.ctx.createGain();
  AUDIO.master.gain.value = 0.4;
  AUDIO.master.connect(AUDIO.ctx.destination);
  return true;
}

function blip(wave, f0, f1, dur, delay = 0, vol = 0.5) {
  if (!AUDIO.ctx || AUDIO.muted) return;
  const t = AUDIO.ctx.currentTime + delay;
  const o = AUDIO.ctx.createOscillator(), g = AUDIO.ctx.createGain();
  o.type = wave;
  o.frequency.setValueAtTime(f0, t);
  if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(AUDIO.master);
  o.start(t);
  o.stop(t + dur + 0.05);
}

// alternating down/up chomp — the "waka waka"
function wakaSound() {
  AUDIO.wakaHigh = !AUDIO.wakaHigh;
  if (AUDIO.wakaHigh) blip('square', 560, 230, 0.1, 0, 0.4);
  else blip('square', 230, 560, 0.1, 0, 0.4);
}

function eatGhostSound() {
  blip('sawtooth', 180, 900, 0.4, 0, 0.5);
}

function deathSound() {
  for (let i = 0; i < 5; i++)
    blip('sawtooth', 720 - i * 100, 320 - i * 40, 0.28, i * 0.14, 0.5);
  blip('square', 200, 60, 0.2, 0.78, 0.6);
  blip('square', 200, 60, 0.2, 1.02, 0.6);
}

// short original start ditty (stand-in for the arcade intro tune)
function jingleSound() {
  [523, 659, 784, 1047, 784, 1319].forEach((f, i) => blip('triangle', f, f, 0.15, i * 0.13, 0.45));
}

function extraLifeSound() {
  for (let i = 0; i < 3; i++) blip('triangle', 1100, 1700, 0.12, i * 0.14, 0.5);
}

function fruitSound() {
  blip('triangle', 740, 740, 0.09, 0, 0.5);
  blip('triangle', 990, 990, 0.12, 0.09, 0.5);
  blip('triangle', 1320, 1320, 0.16, 0.2, 0.45);
}

// continuous background loops: siren (rises as dots run out), fright warble, eyes
const BG_SOUNDS = {
  siren0: {wave: 'triangle', base: 480, depth: 130, lwave: 'sine', lrate: 2.0, vol: 0.16},
  siren1: {wave: 'triangle', base: 560, depth: 140, lwave: 'sine', lrate: 2.4, vol: 0.16},
  siren2: {wave: 'triangle', base: 650, depth: 150, lwave: 'sine', lrate: 2.8, vol: 0.16},
  siren3: {wave: 'triangle', base: 750, depth: 160, lwave: 'sine', lrate: 3.3, vol: 0.16},
  fright: {wave: 'triangle', base: 380, depth: 260, lwave: 'sawtooth', lrate: 7, vol: 0.16},
  eyes:   {wave: 'triangle', base: 850, depth: 400, lwave: 'sawtooth', lrate: 5, vol: 0.12},
};

function setBg(type) {
  if (AUDIO.muted && type) type = null;
  if (AUDIO.bgType === type) return;
  if (AUDIO.bg) {
    try { AUDIO.bg.o.stop(); AUDIO.bg.lfo.stop(); } catch (e) {}
    AUDIO.bg = null;
  }
  AUDIO.bgType = type;
  if (!type || !AUDIO.ctx) return;
  const cfg = BG_SOUNDS[type], c = AUDIO.ctx;
  const o = c.createOscillator(), g = c.createGain();
  const lfo = c.createOscillator(), lg = c.createGain();
  o.type = cfg.wave;
  o.frequency.value = cfg.base;
  g.gain.value = cfg.vol;
  lfo.type = cfg.lwave;
  lfo.frequency.value = cfg.lrate;
  lg.gain.value = cfg.depth;
  lfo.connect(lg).connect(o.frequency);
  o.connect(g).connect(AUDIO.master);
  o.start();
  lfo.start();
  AUDIO.bg = {o, lfo};
}

function updateBgSound() {
  let type = null;
  if (state === 'playing' && !paused) {
    if (ghosts.some(g => g.state === 'eaten')) type = 'eyes';
    else if (frightTimer > 0) type = 'fright';
    else type = 'siren' + (dotsLeft > 170 ? 0 : dotsLeft > 90 ? 1 : dotsLeft > 40 ? 2 : 3);
  }
  setBg(type);
}

// ---------- input ----------

const KEYS = {
  ArrowUp: 0, KeyW: 0, ArrowLeft: 1, KeyA: 1,
  ArrowDown: 2, KeyS: 2, ArrowRight: 3, KeyD: 3,
};

// mobile browsers require audio to start inside a user gesture
function unlockAudio() {
  const fresh = audioInit();
  if (AUDIO.ctx && AUDIO.ctx.state === 'suspended') AUDIO.ctx.resume();
  if (fresh && state === 'ready') jingleSound();
}
function steer(dirIdx) { pac.nextDir = DIRS[dirIdx]; }
function restartIfOver() {
  if (state === 'gameover') { newGame(); jingleSound(); return true; }
  return false;
}
function togglePause() { paused = !paused; }
function toggleMute() { AUDIO.muted = !AUDIO.muted; }

addEventListener('keydown', e => {
  unlockAudio();
  if (e.code in KEYS) {
    steer(KEYS[e.code]);
    e.preventDefault();
  } else if (e.code === 'Enter' || e.code === 'Space') {
    restartIfOver();
    e.preventDefault();
  } else if (e.code === 'KeyP') {
    togglePause();
  } else if (e.code === 'KeyM') {
    toggleMute();
  }
});

// ---------- speed sliders ----------
const pacSlider = document.getElementById('pacSlider');
const ghostSlider = document.getElementById('ghostSlider');
const countSlider = document.getElementById('countSlider');
const pacVal = document.getElementById('pacVal');
const ghostVal = document.getElementById('ghostVal');
const countVal = document.getElementById('countVal');
pacSlider.value = PAC_STEP; pacVal.textContent = PAC_STEP;
ghostSlider.value = GHOST_SPEED; ghostVal.textContent = GHOST_SPEED.toFixed(2);
countSlider.value = GHOST_COUNT; countVal.textContent = GHOST_COUNT;
pacSlider.addEventListener('input', () => {
  PAC_STEP = +pacSlider.value; pacVal.textContent = PAC_STEP;
});
ghostSlider.addEventListener('input', () => {
  GHOST_SPEED = +ghostSlider.value; ghostVal.textContent = GHOST_SPEED.toFixed(2);
});
countSlider.addEventListener('input', () => {
  GHOST_COUNT = +countSlider.value; countVal.textContent = GHOST_COUNT;
  spawnGhosts(); // rebuild the ghost set without disturbing Pac-Man or the dots
});
// keep arrow keys controlling Pac-Man, not a focused slider
for (const s of [pacSlider, ghostSlider, countSlider])
  s.addEventListener('change', () => s.blur());
// collapse / expand the panel
const speedControls = document.getElementById('speedControls');
const speedToggle = document.getElementById('speedToggle');
speedToggle.addEventListener('click', () => {
  const open = speedControls.classList.toggle('collapsed') === false;
  speedToggle.setAttribute('aria-expanded', String(open));
  speedToggle.blur();
});

// ---------- touch / mobile controls ----------
const isTouch = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
if (isTouch) {
  document.body.classList.add('touch');

  // swipe anywhere outside the on-screen buttons sets a direction; a tap restarts
  let sx = 0, sy = 0, swiping = false;
  const inControls = e => e.target.closest && e.target.closest('#controls, #speedControls');
  document.addEventListener('touchstart', e => {
    if (inControls(e)) return;
    unlockAudio();
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY; swiping = true;
    e.preventDefault();
  }, {passive: false});
  document.addEventListener('touchmove', e => {
    if (!inControls(e)) e.preventDefault(); // block scroll / pull-to-refresh
  }, {passive: false});
  document.addEventListener('touchend', e => {
    if (inControls(e) || !swiping) return;
    swiping = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (adx < 24 && ady < 24) { restartIfOver(); return; } // tap, not a swipe
    steer(adx > ady ? (dx > 0 ? 3 : 1) : (dy > 0 ? 2 : 0));
  }, {passive: false});

  // D-pad: one press queues a direction, just like an arrow key
  document.querySelectorAll('#dpad button').forEach(b => {
    const dir = +b.dataset.dir;
    b.addEventListener('pointerdown', e => {
      e.preventDefault();
      unlockAudio();
      if (!restartIfOver()) steer(dir);
    });
  });
  const pauseBtn = document.getElementById('pauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  pauseBtn.addEventListener('pointerdown', e => {
    e.preventDefault(); unlockAudio(); togglePause();
    pauseBtn.textContent = paused ? '►' : '❙❙';
  });
  muteBtn.addEventListener('pointerdown', e => {
    e.preventDefault(); unlockAudio(); toggleMute();
    muteBtn.textContent = AUDIO.muted ? '✕' : '♪';
  });
}

// ---------- main loop ----------

buildGrid();
const mazeBlue = renderMaze('#2121de');
const mazeWhite = renderMaze('#e8e8ff');
newGame();

let last = performance.now(), acc = 0;
function loop(now) {
  acc += Math.min(now - last, 100);
  last = now;
  while (acc >= 1000 / 60) {
    if (!paused) update();
    acc -= 1000 / 60;
  }
  updateBgSound();
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
